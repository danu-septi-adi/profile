<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Danu Septi Adi | Portfolio</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://danuseptiadi.github.io/" />
    <meta property="og:title" content="Danu Septi Adi | Portfolio" />
    <meta
      property="og:description"
      content="Informatics Engineer & Systems Administrator. Lihat proyek dan keahlian teknis saya di sini."
    />
    <meta
      property="og:image"
      content="https://danuseptiadi.github.io/images/preview.jpg"
    />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://danuseptiadi.github.io/" />
    <meta property="twitter:title" content="Danu Septi Adi | Portfolio" />
    <meta
      property="twitter:description"
      content="Informatics Engineer & Systems Administrator."
    />
    <meta
      property="twitter:image"
      content="https://danuseptiadi.github.io/images/preview.jpg"
    />
    <style>
      :root {
        --primary: #38bdf8;
        --secondary: #6366f1;
        --bg-dark: #0f172a;
        --bg-card: #1e293b;
        --text-light: #f8fafc;
      }

      /* RESET & BASE */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: var(--bg-dark);
        color: var(--text-light);
        scroll-behavior: smooth;
        overflow-x: hidden;
        touch-action: manipulation;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      .container {
        width: 90%;
        max-width: 1100px;
        margin: auto;
      }

      /* --- WATER SYSTEM (BALL & SPLASH) --- */
      #water-ball {
        width: 30px;
        height: 30px;
        background: rgba(56, 189, 248, 0.3);
        border: 2px solid rgba(255, 255, 255, 0.4);
        position: fixed;
        top: 0;
        left: 0;
        border-radius: 50%;
        pointer-events: none;
        z-index: 10001;
        box-shadow:
          0 0 20px var(--primary),
          inset 0 0 10px white;
        backdrop-filter: blur(4px);
        transition: transform 0.1s ease-out;
        display: none;
      }

      .splash {
        position: fixed;
        pointer-events: none;
        z-index: 10000;
        border: 2px solid var(--primary);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: waterSplash 0.6s ease-out forwards;
      }

      .drop {
        position: fixed;
        width: 6px;
        height: 6px;
        background: var(--primary);
        border-radius: 50%;
        pointer-events: none;
        z-index: 10000;
        animation: dropOut 0.6s ease-out forwards;
      }

      @keyframes waterSplash {
        0% {
          width: 0;
          height: 0;
          opacity: 1;
          border-width: 4px;
        }
        100% {
          width: 120px;
          height: 120px;
          opacity: 0;
          border-width: 1px;
        }
      }

      @keyframes dropOut {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(var(--dx), var(--dy)) scale(0);
          opacity: 0;
        }
      }

      /* --- NAVBAR WITH GRADIENT BORDER --- */
      nav {
        position: fixed;
        width: 100%;
        top: 0;
        padding: 20px 0;
        transition: 0.4s;
        z-index: 1000;
      }

      nav.scrolled {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(15px);
        padding: 12px 0;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      }

      nav .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-weight: 700;
        font-size: 1.5rem;
        letter-spacing: 1px;
      }
      .logo span {
        color: var(--primary);
      }

      nav ul {
        display: flex;
        gap: 15px;
        list-style: none;
      }

      nav ul li a {
        position: relative;
        padding: 8px 18px;
        font-weight: 500;
        transition: 0.3s;
        opacity: 0.8;
        z-index: 1;
        display: inline-block;
      }

      nav ul li a:hover {
        opacity: 1;
        color: var(--primary);
      }

      nav ul li a::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50px;
        padding: 2px;
        background: linear-gradient(45deg, var(--primary), var(--secondary));
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transform: scale(0.8);
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      nav ul li a:hover::before {
        opacity: 1;
        transform: scale(1);
      }

      /* --- HERO SECTION --- */
      .hero {
        height: 100vh;
        display: flex;
        align-items: center;
        background:
          radial-gradient(
            circle at top right,
            rgba(99, 102, 241, 0.15),
            transparent
          ),
          linear-gradient(135deg, #0f172a, #1e293b);
      }

      .hero h1 {
        font-size: 3.5rem;
        line-height: 1.2;
        margin: 10px 0;
        font-weight: 700;
      }

      .typing {
        color: var(--primary);
        min-height: 1.2em;
        font-weight: 600;
        font-size: 1.5rem;
      }

      .btn {
        margin-top: 30px;
        display: inline-block;
        padding: 14px 32px;
        background: linear-gradient(45deg, var(--primary), var(--secondary));
        border-radius: 50px;
        font-weight: 600;
        transition: 0.4s;
        border: none;
        color: white;
        cursor: pointer;
        position: relative;
        z-index: 10;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4);
      }

      /* --- SECTIONS --- */
      section {
        padding: 100px 0;
      }

      .section-title {
        font-size: 2.5rem;
        margin-bottom: 60px;
        text-align: center;
        position: relative;
      }

      .section-title::after {
        content: "";
        width: 60px;
        height: 4px;
        background: var(--primary);
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 10px;
      }

      /* ABOUT ME */
      .about-content {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 60px;
        align-items: center;
      }

      .about-img {
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .about-img img {
        width: 100%;
        display: block;
        transition: 0.5s;
      }
      .about-img:hover img {
        transform: scale(1.05);
      }

      /* SKILLS */
      .skills-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
      }

      .skill-info {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-weight: 500;
      }

      .progress {
        background: #334155;
        border-radius: 20px;
        height: 12px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        transition: 1.5s cubic-bezier(1, 0, 0, 1);
      }

      /* --- FEATURED PROJECTS (MODERN GLASS) --- */
      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 40px;
      }

      .card {
        background: rgba(30, 41, 59, 0.7); /* Glass effect */
        backdrop-filter: blur(12px);
        border-radius: 24px;
        overflow: hidden;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
      }

      .card:hover {
        transform: translateY(-15px) scale(1.02);
        border-color: var(--primary);
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.4),
          0 0 20px rgba(56, 189, 248, 0.2);
      }

      .card-img {
        position: relative;
        height: 220px;
        overflow: hidden;
        background: #000;
      }
      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.6s ease;
      }

      /* Overlay effect */
      .card-overlay {
        position: absolute;
        inset: 0;
        background: rgba(99, 102, 241, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: 0.4s;
        backdrop-filter: blur(4px);
      }
      .card-overlay i {
        color: white;
        font-size: 2rem;
        transform: translateY(20px);
        transition: 0.4s;
      }
      .card:hover .card-overlay {
        opacity: 1;
      }
      .card:hover .card-overlay i {
        transform: translateY(0);
      }
      .card:hover .card-img img {
        transform: scale(1.1);
      }

      .card-body {
        padding: 30px;
      }

      .card-tags {
        margin-bottom: 12px;
      }
      .card-tags span {
        font-size: 0.7rem;
        background: rgba(56, 189, 248, 0.1);
        color: var(--primary);
        padding: 5px 12px;
        border-radius: 50px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .card h3 {
        color: var(--text-light);
        margin-bottom: 12px;
        font-size: 1.4rem;
      }

      .card p {
        font-size: 0.95rem;
        opacity: 0.7;
        line-height: 1.6;
        margin-bottom: 25px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .btn-project {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--primary);
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.3s;
      }
      .btn-project:hover {
        color: var(--secondary);
        transform: translateX(5px);
      }

      /* --- CONTACT FORM --- */
      .contact-wrapper {
        max-width: 700px;
        margin: auto;
        background: var(--bg-card);
        padding: 40px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      input,
      textarea {
        padding: 18px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 14px;
        color: white;
        outline: none;
        transition: 0.3s;
      }

      input:focus,
      textarea:focus {
        border-color: var(--primary);
        background: #1e293b;
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
      }

      textarea {
        height: 150px;
        resize: none;
      }

      /* UTILS */
      #topBtn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: var(--primary);
        color: white;
        border: none;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        display: none;
        cursor: pointer;
        z-index: 100;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        transition: 0.3s;
      }
      #topBtn:hover {
        transform: translateY(-5px);
        background: var(--secondary);
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .hero h1 {
          font-size: 2.5rem;
        }
        .section-title {
          font-size: 2rem;
        }
        .about-content {
          grid-template-columns: 1fr;
          text-align: center;
        }
        nav ul {
          display: none;
        }
        #water-ball {
          width: 45px;
          height: 45px;
        }
        .projects-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="water-ball"></div>

    <nav id="navbar">
      <div class="container">
        <div class="logo" id="nav-logo"></div>
        <ul id="nav-menu"></ul>
      </div>
    </nav>

    <section class="hero" id="home">
      <div class="container">
        <div data-aos="fade-up">
          <p
            id="hero-welcome"
            style="color: var(--primary); font-weight: 600; letter-spacing: 2px"
          ></p>
          <h1 id="hero-name"></h1>
          <div class="typing"></div>
          <p
            id="hero-desc"
            style="max-width: 600px; margin-top: 15px; opacity: 0.8"
          ></p>
          <a id="hero-btn" href="" class="btn"></a>
        </div>
      </div>
    </section>

    <section id="about">
      <div class="container">
        <h2 class="section-title" data-aos="fade-up">About Me</h2>
        <div class="about-content">
          <div class="about-img" data-aos="zoom-in">
            <img id="about-pfp" src="" alt="Danu Profile" />
          </div>
          <div class="about-text" data-aos="fade-left">
            <div id="about-desc"></div>
            <div style="margin-top: 30px">
              <a
                id="cv-btn"
                href="#"
                target="_blank"
                class="btn"
                style="
                  background: transparent;
                  border: 2px solid var(--primary);
                "
                >Download CV</a
              >
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="skills">
      <div class="container">
        <h2 class="section-title" data-aos="fade-up">Technical Skills</h2>
        <div class="skills-grid" id="skills-container"></div>
      </div>
    </section>

    <section id="projects">
      <div class="container">
        <h2 class="section-title" data-aos="fade-up">Featured Projects</h2>
        <div class="projects-grid" id="projects-container"></div>
      </div>
    </section>

    <section id="contact">
      <div class="container" data-aos="fade-up">
        <h2 class="section-title">Let's Connect</h2>
        <div class="contact-wrapper">
          <form id="contactForm">
            <input
              type="text"
              id="contact-name"
              placeholder="Nama Lengkap"
              required
            />
            <input
              type="text"
              id="contact-company"
              placeholder="Nama Perusahaan / Instansi"
              required
            />
            <textarea
              id="contact-message"
              placeholder="Tuliskan pesan Anda di sini..."
              required
            ></textarea>
            <button class="btn" type="submit">
              Kirim via WhatsApp
              <i class="fab fa-whatsapp" style="margin-left: 8px"></i>
            </button>
          </form>
        </div>
      </div>
    </section>

    <button id="topBtn"><i class="fas fa-chevron-up"></i></button>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
      const App = {
        whatsappNumber: "", // Will be filled from JSON

        async init() {
          try {
            const response = await fetch("./data.json");
            const data = await response.json();

            this.whatsappNumber = data.contact.whatsappNumber; // Save the WA number
            this.render(data);

            AOS.init({ duration: 1000, once: true });
            this.initTyping(data.hero.typingWords);
            this.initSkillObserver();
            this.initScrollEffects();
            this.initWaterSystem();
            this.initContactForm(); // Initialize WA Redirect
          } catch (err) {
            console.error("Gagal load JSON:", err);
          }
        },

        render(data) {
          document.getElementById("nav-logo").innerHTML =
            `${data.navbar.logoFirst}<span>${data.navbar.logoLast}</span>`;
          document.getElementById("nav-menu").innerHTML = data.navbar.menu
            .map((m) => `<li><a href="${m.link}">${m.label}</a></li>`)
            .join("");

          document.getElementById("hero-welcome").innerText =
            data.hero.welcomeText;
          document.getElementById("hero-name").innerText = data.hero.name;
          document.getElementById("hero-desc").innerText =
            data.hero.description;
          const hBtn = document.getElementById("hero-btn");
          hBtn.innerText = data.hero.buttonText;
          hBtn.href = data.hero.buttonLink;

          document.getElementById("about-pfp").src = data.about.image;
          document.getElementById("about-desc").innerHTML =
            data.about.paragraphs
              .map((p) => `<p style="margin-bottom: 15px;">${p}</p>`)
              .join("");
          document.getElementById("cv-btn").href = data.about.cvLink;

          document.getElementById("skills-container").innerHTML = data.skills
            .map(
              (s) => `
                <div class="skill" data-aos="fade-up">
                    <div class="skill-info"><span>${s.name}</span><span>${s.percent}</span></div>
                    <div class="progress"><div class="progress-bar" data-width="${s.percent}"></div></div>
                </div>
            `,
            )
            .join("");

          document.getElementById("projects-container").innerHTML =
            data.projects
              .map(
                (p) => `
                            <div class="card" data-aos="fade-up">
                                <div class="card-img">
                                    <img src="${p.image}" alt="${p.title}">
                                    <div class="card-overlay">
                                        <i class="fas fa-external-link-alt"></i>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <div class="card-tags">
                                        <span><i class="fas fa-code"></i> Tech Solution</span>
                                    </div>
                                    <h3>${p.title}</h3>
                                    <p>${p.desc}</p>
                                    <a href="${p.link}" class="btn-project">
                                        Detail Project <i class="fas fa-chevron-right"></i>
                                    </a>
                                </div>
                            </div>
                        `,
              )
              .join("");
        },

        initContactForm() {
          const form = document.getElementById("contactForm");
          form.addEventListener("submit", (e) => {
            e.preventDefault(); // Stop form refreshing page

            const name = document.getElementById("contact-name").value;
            const company = document.getElementById("contact-company").value;
            const message = document.getElementById("contact-message").value;

            // Format the WhatsApp message
            const text = `Halo Danu, saya *${name}* dari *${company}*.\n\n${message}`;
            const encodedText = encodeURIComponent(text);

            // Redirect to wa.me
            const whatsappUrl = `https://wa.me/${this.whatsappNumber}?text=${encodedText}`;
            window.open(whatsappUrl, "_blank");
          });
        },

        initTyping(words) {
          let i = 0,
            j = 0,
            isDeleting = false;
          const el = document.querySelector(".typing");
          function type() {
            let current = words[i];
            el.textContent = isDeleting
              ? current.substring(0, j - 1)
              : current.substring(0, j + 1);
            j = isDeleting ? j - 1 : j + 1;
            if (!isDeleting && j === current.length) {
              isDeleting = true;
              setTimeout(type, 2000);
            } else if (isDeleting && j === 0) {
              isDeleting = false;
              i = (i + 1) % words.length;
              setTimeout(type, 500);
            } else {
              setTimeout(type, isDeleting ? 40 : 80);
            }
          }
          type();
        },

        initSkillObserver() {
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  entry.target
                    .querySelectorAll(".progress-bar")
                    .forEach((bar) => (bar.style.width = bar.dataset.width));
                }
              });
            },
            { threshold: 0.1 },
          );
          obs.observe(document.getElementById("skills"));
        },

        initScrollEffects() {
          const nav = document.getElementById("navbar");
          const topBtn = document.getElementById("topBtn");
          window.addEventListener("scroll", () => {
            window.scrollY > 50
              ? nav.classList.add("scrolled")
              : nav.classList.remove("scrolled");
            topBtn.style.display = window.scrollY > 600 ? "block" : "none";
          });
          topBtn.onclick = () =>
            window.scrollTo({ top: 0, behavior: "smooth" });
        },

        initWaterSystem() {
          const ball = document.getElementById("water-ball");
          let mX = 0,
            mY = 0,
            bX = 0,
            bY = 0;
          const moveHandler = (e) => {
            ball.style.display = "block";
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            mX = clientX;
            mY = clientY;
          };
          window.addEventListener("mousemove", moveHandler);
          window.addEventListener("touchmove", moveHandler);
          function lerp() {
            bX += (mX - bX) * 0.15;
            bY += (mY - bY) * 0.15;
            ball.style.transform = `translate(${bX - 15}px, ${bY - 15}px)`;
            requestAnimationFrame(lerp);
          }
          lerp();
          const createSplash = (e) => {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : mX);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : mY);
            const ring = document.createElement("div");
            ring.className = "splash";
            ring.style.left = x + "px";
            ring.style.top = y + "px";
            document.body.appendChild(ring);
            setTimeout(() => ring.remove(), 600);
            for (let i = 0; i < 6; i++) {
              const d = document.createElement("div");
              d.className = "drop";
              d.style.left = x + "px";
              d.style.top = y + "px";
              d.style.setProperty("--dx", (Math.random() - 0.5) * 120 + "px");
              d.style.setProperty("--dy", (Math.random() - 0.5) * 120 + "px");
              document.body.appendChild(d);
              setTimeout(() => d.remove(), 600);
            }
          };
          window.addEventListener("mousedown", createSplash);
          window.addEventListener("touchstart", (e) => {
            moveHandler(e);
            createSplash(e);
          });
        },
      };
      App.init();
    </script>
  </body>
</html>
